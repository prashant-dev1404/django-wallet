services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playto -d playto"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             python manage.py setup_schedules &&
             python manage.py runserver --noreload 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://playto:playto@postgres:5432/playto
      SECRET_KEY: dev-only-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    command: python manage.py qcluster
    environment:
      DATABASE_URL: postgres://playto:playto@postgres:5432/playto
      SECRET_KEY: dev-only-key-not-for-production
      DEBUG: "True"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
