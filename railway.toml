# railway.toml
#
# Railway deployment config. Tells Railway how to build and run the backend
# services (web + worker).
#
# TODO when implementing:
#
# [build]
# builder = "DOCKERFILE"
# dockerfilePath = "backend/Dockerfile"
# buildContext = "backend"
#
# [deploy]
# startCommand = "uv run gunicorn playto.wsgi:application --bind 0.0.0.0:$PORT"
# healthcheckPath = "/healthz"
# healthcheckTimeout = 30
# restartPolicyType = "ON_FAILURE"
# restartPolicyMaxRetries = 3
#
# Notes for setting up Railway by hand (the toml is a hint; the dashboard
# is the source of truth):
#
#   1. Create a project, add the Postgres addon. DATABASE_URL is auto-injected.
#   2. Create the WEB service from this repo, root /backend.
#      Set start command: gunicorn playto.wsgi:application --bind 0.0.0.0:$PORT
#      Set release command: python manage.py migrate && python manage.py setup_schedules
#      Healthcheck path: /healthz
#   3. Create the WORKER service from the same repo and Dockerfile.
#      Override start command: python manage.py qcluster
#      No healthcheck (qcluster doesn't expose HTTP).
#   4. Set env vars (both services):
#        DJANGO_SECRET_KEY  -> generate a long random string
#        DJANGO_DEBUG       -> False
#        DJANGO_ALLOWED_HOSTS -> <railway-generated-domain>.up.railway.app
#        CORS_ALLOWED_ORIGINS -> <vercel-frontend-domain>
#   5. After first deploy, run the seed command once:
#        railway run --service backend python manage.py seed
#      Capture the merchant UUIDs printed and put them in the README.
#
# Why two services and not one with both processes (e.g. honcho/foreman):
#   Cleaner logs, independent restart policies, can scale workers separately.
#   Trade-off: two services consume two slots on the free tier. Acceptable
#   for the challenge.
