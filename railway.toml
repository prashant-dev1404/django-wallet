[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "python manage.py migrate"
startCommand = "sh -c 'if [ \"$WORKER\" = \"true\" ]; then python manage.py qcluster; else python manage.py seed && python manage.py setup_schedules && python manage.py collectstatic --noinput && gunicorn playto.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60; fi'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
